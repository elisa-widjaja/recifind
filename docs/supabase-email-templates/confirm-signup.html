<!--
  Supabase confirm-signup email template for ReciFriend.

  Where to paste: Supabase Dashboard
    https://supabase.com/dashboard/project/jpjuaaxwfpemecbwwthk/auth/templates
    → "Confirm signup" tab → paste the <body>... contents into the HTML body field.

  Subject suggestion: "Your ReciFriend sign-in code"

  Variables used:
    {{ .Token }}  — 6/8-digit OTP code (the only sign-in path)
    {{ .Email }}  — recipient address

  Why this exists (separate from the Magic Link template):
  Supabase fires "Confirm signup" — not "Magic Link" — when signInWithOtp is
  called for an email that doesn't yet have an auth.users row AND "Confirm
  email" is enabled in Auth settings. The default Confirm Signup template
  renders {{ .ConfirmationURL }} (a clickable link), which breaks the app's
  OTP-only sign-in UX: the user is on the OTP-entry screen waiting for a
  6-digit code while their inbox shows a "Confirm your email" button instead.

  This template matches magic-link.html so new-user and returning-user
  experiences are identical. {{ .ConfirmationURL }} is intentionally NOT
  rendered — the same PKCE-loss / Universal-Link handoff issues that killed
  the link path for Magic Link apply here too.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your ReciFriend sign-in code</title>
  </head>
  <body style="margin:0; padding:0; background:#f6f7f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#1f2330;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f6f7f9; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff; border-radius:14px; overflow:hidden; max-width:480px; width:100%; box-shadow:0 1px 2px rgba(0,0,0,0.04);">
            <!-- Header -->
            <tr>
              <td style="padding:28px 32px 8px 32px;">
                <div style="font-size:13px; font-weight:600; letter-spacing:0.04em; color:#7a7f8a; text-transform:uppercase;">ReciFriend</div>
              </td>
            </tr>

            <!-- Heading -->
            <tr>
              <td style="padding:8px 32px 4px 32px;">
                <h1 style="margin:0; font-size:22px; line-height:1.3; font-weight:600; color:#1f2330;">
                  Welcome to ReciFriend
                </h1>
              </td>
            </tr>

            <!-- Lede -->
            <tr>
              <td style="padding:12px 32px 20px 32px;">
                <p style="margin:0; font-size:15px; line-height:1.5; color:#4b5160;">
                  Enter this code in the app to finish creating your account. The code expires in 1 hour.
                </p>
              </td>
            </tr>

            <!-- Primary: OTP code -->
            <tr>
              <td style="padding:8px 32px 24px 32px;">
                <div style="background:#f1f3f7; border-radius:10px; padding:24px 16px; text-align:center;">
                  <div style="font-size:32px; line-height:1.1; font-weight:700; letter-spacing:0.18em; color:#1f2330; font-family:'SF Mono', ui-monospace, Menlo, Monaco, Consolas, monospace;">
                    {{ .Token }}
                  </div>
                </div>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:0 32px;">
                <div style="height:1px; background:#eaecef; margin:0;"></div>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:18px 32px 28px 32px;">
                <p style="margin:0; font-size:12px; line-height:1.5; color:#9aa0ac;">
                  If you didn't try to sign up for ReciFriend, you can safely ignore this email — no account will be created without the code.
                </p>
              </td>
            </tr>
          </table>

          <!-- Outer footer -->
          <table role="presentation" width="480" cellspacing="0" cellpadding="0" border="0" style="max-width:480px; width:100%;">
            <tr>
              <td align="center" style="padding:16px 16px 0 16px;">
                <p style="margin:0; font-size:12px; line-height:1.5; color:#9aa0ac;">
                  Sent to {{ .Email }} · ReciFriend
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
