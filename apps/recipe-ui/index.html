<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#6200EA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ReciFriend" />
    <title>ReciFriend — Recipes worth sharing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
      html, body { margin: 0; padding: 0; background: #fafafa; }
      html.dark, html.dark body { background: #121212; }

      /* Web splash + iOS WebView defensive layer. On web this is the only
         splash. On iOS the native @capacitor/splash-screen plugin sits on
         top of this until JS calls hide() — both fades fire together so
         the WebView underneath is already fully transparent by the time
         the native splash finishes its fade.

         Logo size tracks the native Splash.imageset (2732×2732 canvas
         with the logo at 800px ≈ 29% of canvas width, scaleAspectFit'd
         to the device width on phones). Using 29vw with a clamp keeps
         the HTML logo and the native logo at the same on-screen size
         across iPhone SE → Pro Max, while bounding both for desktop. */
      .app-splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 800ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      html.dark .app-splash {
        background: #000000;
      }
      body.app-ready .app-splash {
        opacity: 0;
        pointer-events: none;
      }
      .app-splash-logo {
        width: clamp(96px, 29vw, 144px);
        height: clamp(96px, 29vw, 144px);
      }
    </style>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('recifriend-dark-mode');
          var isDark = saved !== null
            ? saved === 'true'
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W2LEPNDMF0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W2LEPNDMF0');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-splash" class="app-splash" aria-hidden="true">
      <img src="/icon.svg" alt="" class="app-splash-logo" />
    </div>
    <!-- Visible privacy link so OAuth consent screen verifiers (Google etc.)
         can confirm the home page links to the privacy policy. Subtle in the
         corner, doesn't interfere with the app UI. -->
    <a href="/privacy" style="position:fixed; bottom:4px; right:8px; font-size:10px; color:#999; text-decoration:none; z-index:9999; opacity:0.6;">Privacy</a>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
