name = "recipes-worker"
main = "src/index.ts"
compatibility_date = "2024-03-20"
workers_dev = true
routes = [
  { pattern = "api.recifriend.com/*", zone_name = "recifriend.com" },
  { pattern = "recifind.elisawidjaja.com/*", zone_name = "elisawidjaja.com" }
]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "recipes-db"
database_id = "b02df58e-38fa-4c26-896a-5323bcc9d35d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "AI_PICKS_CACHE"
id = "d5c0419e6a2e4b5aadc271a376a73b01"
preview_id = "a4ad5a02524345358465751ef99b8b91"

[[kv_namespaces]]
binding = "KV_RATE"
id = "9d046018460a42ec803ac41f77b5cd10"
preview_id = "eb1a7faac0034745b248b4f40d6ded00"

[vars]
AUTH_ISSUER = "https://jpjuaaxwfpemecbwwthk.supabase.co/auth/v1"
AUTH_AUDIENCE = "authenticated"
AUTH_JWKS_URL = "https://jpjuaaxwfpemecbwwthk.supabase.co/auth/v1/.well-known/jwks.json"
SUPABASE_URL = "https://jpjuaaxwfpemecbwwthk.supabase.co"
SUPABASE_STORAGE_BUCKET = "recipe-previews"

# Secrets (set via wrangler secret put):
# - DEV_API_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - GEMINI_SERVICE_ACCOUNT_B64
# - APNS_AUTH_KEY_P8   (ES256 private key from Apple Developer portal)
# - APNS_KEY_ID        (MFH9S45A26)
# - APNS_TEAM_ID       (7C6PMUN99K)
# - APNS_BUNDLE_ID     (com.recifriend.app)

[triggers]
crons = ["0 * * * *"]
