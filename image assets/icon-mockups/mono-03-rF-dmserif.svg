<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <defs>
    <radialGradient id="glassBg" cx="50%" cy="20%" r="95%">
      <stop offset="0%" stop-color="#A883FF"/>
      <stop offset="55%" stop-color="#6200EA"/>
      <stop offset="100%" stop-color="#34007A"/>
    </radialGradient>
    <linearGradient id="glassSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="38%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glassSpec" cx="32%" cy="22%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glassRim" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- base -->
  <rect width="512" height="512" rx="112" fill="url(#glassBg)"/>
  <!-- bottom inner-rim glow (light bouncing back up) -->
  <rect width="512" height="512" rx="112" fill="url(#glassRim)"/>
  <!-- top sheen -->
  <rect width="512" height="512" rx="112" fill="url(#glassSheen)"/>
  <!-- specular highlight -->
  <ellipse cx="180" cy="120" rx="160" ry="80" fill="url(#glassSpec)"/>
  <!-- subtle inner stroke for the glass edge -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

  <text x="256" y="380"
        font-family="'DM Serif Display', 'Playfair Display', serif"
        font-size="400"
        font-weight="400"
        
        fill="#FFFFFF"
        text-anchor="middle">rF</text>
</svg>